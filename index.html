<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hetal Vani | Cyber Security Portfolio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0c1015; color: #f0f6fc; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #161b22; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #30363d; width: 400px; }
        .profile-pic { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 5px solid #238636; margin-bottom: 20px; }
        h1 { color: #f0f6fc; margin-bottom: 5px; font-size: 32px; }
        h3 { color: #238636; font-weight: 400; margin-top: 0; font-size: 20px; }
        p { color: #8b949e; line-height: 1.6; }
        .info-tag { background: #21262d; border: 1px solid #30363d; padding: 5px 15px; border-radius: 5px; color: #8b949e; margin: 10px 0; display: inline-block; }
        .docker-badge { background: #0db7ed; color: white; padding: 5px 15px; border-radius: 50px; font-size: 14px; font-weight: bold; position: absolute; top: 20px; right: 20px; }
        .container { position: relative; }
        hr { border: 0; border-top: 1px solid #30363d; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <span class="docker-badge">DOCKERIFIED</span>
        <div class="card">
            <img src="hetal-photo.png" alt="Hetal Vani" class="profile-pic">
            <h1>Hetal Vani</h1>
            <h3>Cyber Security Specialist | Semester 6</h3>
            <hr>
            <p>Welcome! This is a Docker deployment practical demonstrating my skills in:</p>
            <div class="info-tag">Containerization</div>
            <div class="info-tag">Cloud Infrastructure</div>
            <p>Hetal, you can update your projects here.</p>
            <p>Stream: <b>Cyber Security</b></p>
        </div>
    </div>
</body>
</html>
